name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 这一行让你可以在网页上手动点按钮运行

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperChanger
          path: ./publish/WallpaperChanger.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/WallpaperChanger.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
